<script>
document.addEventListener("DOMContentLoaded", function () {
  var bar     = document.getElementById("dept-header-bar");
  var textBox = bar ? bar.querySelector(".dept-header-text") : null;

  // Move Quarto's entire title block into the branded header bar. Relocating
  // the whole block (rather than copying individual fields) means anything
  // Quarto renders natively appears in-brand without the theme needing to
  // know about each field.
  var titleBlock = document.getElementById("title-block-header") ||
                   document.querySelector("header.quarto-title-block");
  if (titleBlock && textBox) {
    textBox.appendChild(titleBlock);
  }

  // The `code-tools` button ships inside the title block; lift it out to the
  // right of the bar. Quarto uses a dropdown menu (`#quarto-code-tools-menu`,
  // when code folding is on) or a single "View Source" button
  // (`#quarto-code-tools-source`, when it is off); match either by class and
  // carry a dropdown menu along only when one exists.
  var codeTools = document.querySelector(".code-tools-button");
  if (bar && codeTools) {
    var menu = codeTools.nextElementSibling; // dropdown <ul>, if any
    var hasMenu = menu && menu.classList.contains("dropdown-menu");
    var wrap = document.createElement("div");
    wrap.className = hasMenu ? "dept-header-tools dropdown" : "dept-header-tools";
    wrap.appendChild(codeTools);
    if (hasMenu) {
      wrap.appendChild(menu);
    }
    var logo = bar.querySelector(".dept-logo");
    if (logo) {
      bar.insertBefore(wrap, logo);
    } else {
      bar.appendChild(wrap);
    }
  }

  var content = document.querySelector("#quarto-content");
  if (bar && content && content.parentNode) {
    content.parentNode.insertBefore(bar, content);
  }
});
</script>
